<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pyranometer Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    #logo {
      height: 60px;
      width: auto;
      max-width: 200px;
      object-fit: contain;
    }

    .logo-placeholder {
      height: 60px;
      width: 60px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 30px;
      font-weight: bold;
    }

    h1 {
      color: #2d3748;
      font-size: 2em;
      font-weight: 700;
    }

    .time-controls {
      display: flex;
      gap: 10px;
    }

    .time-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .time-btn:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .time-btn.active {
      background: #764ba2;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
    }

    .stat-label {
      color: #718096;
      font-size: 0.9em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .stat-value {
      color: #2d3748;
      font-size: 2.5em;
      font-weight: 700;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .stat-unit {
      font-size: 0.5em;
      color: #718096;
      font-weight: 500;
    }

    .stat-trend {
      margin-top: 10px;
      font-size: 0.85em;
      color: #48bb78;
      font-weight: 600;
    }

    .chart-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .chart-title {
      color: #2d3748;
      font-size: 1.5em;
      font-weight: 700;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #f0fff4;
      border-radius: 20px;
      color: #22543d;
      font-weight: 600;
      font-size: 0.9em;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      background: #48bb78;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    canvas {
      max-height: 400px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #718096;
      font-size: 1.1em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <!-- Option 1: Use your actual logo file -->
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Company Logo" id="logo" onerror="this.style.display='none'; document.querySelector('.logo-placeholder').style.display='flex';">
        <!-- Option 2: Fallback if logo.png doesn't exist -->
        <div class="logo-placeholder" style="display: none;">☀️</div>
        <h1>Pyranometer Dashboard</h1>
      </div>
      <div class="time-controls">
        <button class="time-btn" onclick="changeTimeRange('1h')">1 Hour</button>
        <button class="time-btn" onclick="changeTimeRange('6h')">6 Hours</button>
        <button class="time-btn" onclick="changeTimeRange('24h')">24 Hours</button>
        <button class="time-btn active" onclick="changeTimeRange('all')">All Time</button>
      </div>
    </header>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Current Irradiance</div>
        <div class="stat-value">
          <span id="irradiance">--</span>
          <span class="stat-unit">W/m²</span>
        </div>
        <div class="stat-trend" id="irradiance-trend">--</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Peak Today</div>
        <div class="stat-value">
          <span id="peak">--</span>
          <span class="stat-unit">W/m²</span>
        </div>
        <div class="stat-trend" id="peak-time">--</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Average</div>
        <div class="stat-value">
          <span id="average">--</span>
          <span class="stat-unit">W/m²</span>
        </div>
        <div class="stat-trend" id="data-points">--</div>
      </div>
    </div>

    <div class="chart-container">
      <div class="chart-header">
        <h2 class="chart-title">Irradiance Over Time</h2>
        <div class="status-indicator">
          <div class="status-dot"></div>
          <span>Live Data</span>
        </div>
      </div>
      <canvas id="irradianceChart"></canvas>
    </div>
  </div>

  <script>
    let chart;
    let allData = [];
    let currentTimeRange = 'all';
    let previousIrradiance = null;

    // Initialize chart with fancy styling
    const ctx = document.getElementById('irradianceChart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'Irradiance (W/m²)',
          data: [],
          borderColor: 'rgba(102, 126, 234, 1)',
          backgroundColor: 'rgba(102, 126, 234, 0.1)',
          borderWidth: 3,
          fill: true,
          tension: 0.4,
          pointRadius: 0,
          pointHoverRadius: 6,
          pointHoverBackgroundColor: 'rgba(102, 126, 234, 1)',
          pointHoverBorderColor: '#fff',
          pointHoverBorderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        interaction: {
          intersect: false,
          mode: 'index'
        },
        plugins: {
          legend: {
            display: false
          },
          tooltip: {
            backgroundColor: 'rgba(0, 0, 0, 0.8)',
            padding: 12,
            titleColor: '#fff',
            bodyColor: '#fff',
            borderColor: 'rgba(102, 126, 234, 0.5)',
            borderWidth: 1,
            displayColors: false,
            callbacks: {
              title: function(context) {
                return new Date(context[0].parsed.x).toLocaleString();
              },
              label: function(context) {
                return 'Irradiance: ' + context.parsed.y.toFixed(2) + ' W/m²';
              }
            }
          }
        },
        scales: {
          x: {
            type: 'time',
            time: {
              tooltipFormat: 'MMM dd, HH:mm',
              displayFormats: {
                minute: 'HH:mm',
                hour: 'MMM dd HH:mm',
                day: 'MMM dd'
              }
            },
            title: {
              display: true,
              text: 'Time',
              color: '#4a5568',
              font: { size: 14, weight: '600' }
            },
            grid: {
              color: 'rgba(0, 0, 0, 0.05)'
            },
            ticks: {
              color: '#718096'
            }
          },
          y: {
            title: {
              display: true,
              text: 'Irradiance (W/m²)',
              color: '#4a5568',
              font: { size: 14, weight: '600' }
            },
            grid: {
              color: 'rgba(0, 0, 0, 0.05)'
            },
            ticks: {
              color: '#718096'
            },
            beginAtZero: true
          }
        }
      }
    });

    // Load historical data
    async function loadHistoricalData() {
      try {
        const response = await fetch('/get_logged_data');
        const rows = await response.json();
        
        allData = rows.map(row => ({
          timestamp: new Date(row[0]),
          irradiance: parseFloat(row[1])
        })).filter(d => !isNaN(d.irradiance));

        updateChart();
        updateStats();
      } catch (error) {
        console.error('Error loading historical data:', error);
      }
    }

    function changeTimeRange(range) {
      currentTimeRange = range;
      document.querySelectorAll('.time-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      updateChart();
    }

    function filterDataByTimeRange(data) {
      if (currentTimeRange === 'all') return data;
      
      const now = new Date();
      const hours = currentTimeRange === '1h' ? 1 : currentTimeRange === '6h' ? 6 : 24;
      const cutoff = new Date(now - hours * 60 * 60 * 1000);
      
      return data.filter(d => d.timestamp >= cutoff);
    }

    function updateChart() {
      const filteredData = filterDataByTimeRange(allData);
      
      chart.data.labels = filteredData.map(d => d.timestamp);
      chart.data.datasets[0].data = filteredData.map(d => d.irradiance);
      chart.update('none');
    }

    function updateStats() {
      if (allData.length === 0) return;

      const latest = allData[allData.length - 1];
      const filteredData = filterDataByTimeRange(allData);
      
      // Current values
      document.getElementById('irradiance').textContent = latest.irradiance.toFixed(2);

      // Trend
      if (previousIrradiance !== null) {
        const change = latest.irradiance - previousIrradiance;
        const trendEl = document.getElementById('irradiance-trend');
        if (change > 0) {
          trendEl.textContent = `↑ ${change.toFixed(2)} W/m² from previous`;
          trendEl.style.color = '#48bb78';
        } else if (change < 0) {
          trendEl.textContent = `↓ ${Math.abs(change).toFixed(2)} W/m² from previous`;
          trendEl.style.color = '#f56565';
        } else {
          trendEl.textContent = 'Stable';
          trendEl.style.color = '#718096';
        }
      }
      previousIrradiance = latest.irradiance;

      // Peak
      const peak = Math.max(...filteredData.map(d => d.irradiance));
      const peakData = filteredData.find(d => d.irradiance === peak);
      document.getElementById('peak').textContent = peak.toFixed(2);
      document.getElementById('peak-time').textContent = peakData ? 
        'at ' + peakData.timestamp.toLocaleTimeString() : '--';

      // Average
      const avg = filteredData.reduce((sum, d) => sum + d.irradiance, 0) / filteredData.length;
      document.getElementById('average').textContent = avg.toFixed(2);
      document.getElementById('data-points').textContent = `${filteredData.length} readings`;
    }

    // EventSource for real-time updates
    const source = new EventSource('/data_stream');
    source.onmessage = function(event) {
      try {
        const data = JSON.parse(event.data.replace(/'/g, '"'));
        const newPoint = {
          timestamp: new Date(data.timestamp),
          irradiance: data.irradiance
        };
        
        allData.push(newPoint);
        updateChart();
        updateStats();
      } catch (error) {
        console.error('Error parsing data:', error);
      }
    };

    // Initialize
    loadHistoricalData();
  </script>
</body>
</html>
